<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Abrasito de Andres</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 800px at 50% 25%, #1f2937, #0b1220);
      }
      .wrap {
        width: min(720px, 92vw);
        display: grid;
        gap: 18px;
        justify-items: center;
      }
      #btn {
        width: min(560px, 92vw);
        min-height: 120px;
        padding: 18px 22px;
        font-size: clamp(20px, 4.2vw, 34px);
        font-weight: 800;
        border: 0;
        border-radius: 24px;
        cursor: pointer;
        background: linear-gradient(135deg, #86efac, #4ade80);
        color: #111827;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        transition: transform 120ms ease, filter 120ms ease;
      }
      #btn:active {
        transform: translateY(1px) scale(0.99);
        filter: brightness(0.98);
      }
      .menu-toggle {
        position: fixed;
        top: 16px;
        z-index: 30;
        border: 0;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 20px;
        font-weight: 800;
        cursor: pointer;
        background: rgba(125, 211, 252, 0.95);
        color: #082f49;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      }
      .menu-toggle-left {
        left: 16px;
      }
      .menu-toggle-right {
        right: 16px;
      }
      .menu-backdrop {
        position: fixed;
        inset: 0;
        z-index: 24;
        display: none;
        background: rgba(2, 6, 23, 0.4);
      }
      .menu-backdrop.open {
        display: block;
      }
      .movie-menu {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 25;
        width: min(340px, 86vw);
        height: 100vh;
        overflow: auto;
        padding: 68px 14px 14px;
        border-radius: 0 16px 16px 0;
        background: rgba(233, 213, 255, 0.96);
        border-right: 1px solid rgba(167, 139, 250, 0.5);
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
        color: #3b0764;
        transform: translateX(-105%);
        transition: transform 180ms ease;
      }
      .movie-menu.open {
        transform: translateX(0);
      }
      .movie-menu h3 {
        margin: 0 0 10px;
        font-size: clamp(16px, 3vw, 22px);
      }
      .thought-menu {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 25;
        width: min(340px, 86vw);
        height: 100vh;
        overflow: auto;
        padding: 68px 14px 14px;
        border-radius: 16px 0 0 16px;
        background: rgba(233, 213, 255, 0.96);
        border-left: 1px solid rgba(167, 139, 250, 0.5);
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
        color: #3b0764;
        transform: translateX(105%);
        transition: transform 180ms ease;
      }
      .thought-menu.open {
        transform: translateX(0);
      }
      .movie-input-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        margin-bottom: 10px;
      }
      .movie-input-row input {
        border: 1px solid rgba(167, 139, 250, 0.55);
        border-radius: 10px;
        padding: 10px 12px;
        background: rgba(245, 243, 255, 0.95);
        color: #3b0764;
      }
      .movie-input-row button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
        background: #a78bfa;
        color: #111827;
      }
      .movie-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }
      .movie-item {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
        background: rgba(51, 65, 85, 0.45);
        border-radius: 10px;
        padding: 8px 10px;
      }
      .entry-actions {
        display: inline-flex;
        gap: 6px;
      }
      .entry-actions button {
        border: 0;
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn-edit {
        background: #93c5fd;
        color: #082f49;
      }
      .btn-delete {
        background: #fca5a5;
        color: #7f1d1d;
      }
      .movie-item.seen .movie-title {
        text-decoration: line-through;
        opacity: 0.75;
      }
      .tick-label {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        font-size: 13px;
      }
      .thoughts-title {
        margin: 0 0 10px;
        font-size: clamp(14px, 2.6vw, 18px);
        line-height: 1.3;
      }
      .thoughts-input-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-bottom: 10px;
      }
      .thoughts-input-row textarea {
        border: 1px solid rgba(167, 139, 250, 0.55);
        border-radius: 10px;
        padding: 10px 12px;
        background: rgba(245, 243, 255, 0.95);
        color: #3b0764;
        resize: vertical;
        min-height: 86px;
      }
      .thoughts-input-row button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
        background: #22c55e;
        color: #111827;
      }
      .thoughts-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }
      .thought-item {
        background: rgba(51, 65, 85, 0.45);
        border-radius: 10px;
        padding: 8px 10px;
        line-height: 1.35;
        word-break: break-word;
      }
      .thought-item-top {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: start;
      }
      .thought-item-meta {
        margin-top: 6px;
        font-size: 12px;
        opacity: 0.8;
      }
      .movie-random {
        margin-top: 12px;
        border-top: 1px solid rgba(167, 139, 250, 0.35);
        padding-top: 10px;
      }
      .movie-random button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 800;
        cursor: pointer;
        background: #67e8f9;
        color: #164e63;
      }
      .movie-random-message {
        margin: 8px 0 0;
        font-size: 14px;
        font-weight: 700;
      }
      .mood-card {
        width: min(560px, 92vw);
        border-radius: 16px;
        padding: 12px 14px;
        background: rgba(236, 253, 245, 0.18);
        border: 1px solid rgba(110, 231, 183, 0.45);
        color: #ecfeff;
        text-align: center;
      }
      .mood-title {
        margin: 0 0 8px;
        font-size: clamp(16px, 3vw, 22px);
        font-weight: 800;
      }
      .mood-slider-wrap {
        display: grid;
        gap: 8px;
      }
      .mood-slider {
        width: 100%;
        accent-color: #34d399;
      }
      .mood-scale {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 700;
        opacity: 0.95;
      }
      .mood-selected {
        margin: 8px 0 0;
        font-size: 14px;
        font-weight: 700;
      }
      .sync-status {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 40;
        max-width: min(760px, 94vw);
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(2, 6, 23, 0.82);
        color: #f8fafc;
        font-size: 13px;
        display: none;
      }
      .sync-status.show {
        display: block;
      }
      @media (max-width: 860px) {
        .movie-menu {
          width: min(360px, 92vw);
        }
        .thought-menu {
          width: min(360px, 92vw);
        }
      }
      img {
        display: none;
        width: min(560px, 92vw);
        height: auto;
        border-radius: 18px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      }
      .countdown {
        display: none;
        width: min(560px, 92vw);
        text-align: center;
        color: #f5f3ff;
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 16px;
        padding: 16px 14px;
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.3);
      }
      .countdown-title {
        margin: 0 0 8px;
        font-size: clamp(16px, 3.2vw, 24px);
        font-weight: 800;
      }
      .countdown-value {
        margin: 0;
        font-size: clamp(20px, 4.2vw, 34px);
        font-weight: 900;
        letter-spacing: 0.5px;
      }
      .top-message {
        position: fixed;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        width: min(720px, 92vw);
        padding: 18px 18px;
        text-align: center;
        font-size: clamp(26px, 6vw, 44px);
        font-weight: 900;
        color: #f5f3ff;
        background: rgba(124, 58, 237, 0.22);
        border: 1px solid rgba(196, 181, 253, 0.35);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      }
      .hint {
        opacity: 0.85;
        text-align: center;
        font-size: 14px;
        max-width: 60ch;
      }
    </style>
  </head>
  <body>
    <button id="menuToggle" class="menu-toggle menu-toggle-left" type="button">
      ☰
    </button>
    <button
      id="thoughtToggle"
      class="menu-toggle menu-toggle-right"
      type="button"
      aria-label="Abrir pensamientos"
    >
      📝 Pens.
    </button>
    <div id="menuBackdrop" class="menu-backdrop"></div>
    <div id="thoughtBackdrop" class="menu-backdrop"></div>
    <div id="syncStatus" class="sync-status"></div>
    <div id="msg" class="top-message">Que pases un precioso(como tú) día💜🧸</div>
    <aside id="movieMenu" class="movie-menu">
      <h3>Películas para ver</h3>
      <div class="movie-input-row">
        <input
          id="movieInput"
          type="text"
          placeholder="Añade una película..."
          maxlength="80"
        />
        <button id="addMovieBtn" type="button">Añadir</button>
      </div>
      <ul id="movieList" class="movie-list"></ul>
      <div class="movie-random">
        <button id="randomMovieBtn" type="button">Elegir película aleatoria</button>
        <p id="randomMovieMessage" class="movie-random-message"></p>
      </div>
    </aside>
    <aside id="thoughtMenu" class="thought-menu">
      <h3 class="thoughts-title">Pensamientos introspectivos</h3>
      <div class="thoughts-input-row">
        <textarea
          id="thoughtInput"
          placeholder="Escribe un pensamiento con detalle..."
          maxlength="500"
        ></textarea>
        <button id="addThoughtBtn" type="button">Guardar</button>
      </div>
      <ul id="thoughtList" class="thoughts-list"></ul>
    </aside>
    <div class="wrap">
      <button id="btn">Clica para recibir un Abrasito⭐</button>
      <div class="mood-card">
        <p class="mood-title">¿Cómo te sientes hoy?</p>
        <div class="mood-slider-wrap">
          <input
            id="moodSlider"
            class="mood-slider"
            type="range"
            min="0"
            max="100"
            step="1"
            value="50"
          />
          <div class="mood-scale">
            <span>Triste 😔</span>
            <span>Feliz 😊</span>
          </div>
        </div>
        <p id="moodSelected" class="mood-selected">Ánimo actual: Sin elegir</p>
      </div>
      <img id="flork" src="./Florkyflor.png" alt="Flork" />
      <div id="countdown" class="countdown">
        <p class="countdown-title">Tiempo para vernos (como máx)</p>
        <p id="countdownValue" class="countdown-value">42d 00h 00m 00s</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const btn = document.getElementById("btn");
      const img = document.getElementById("flork");
      const msg = document.getElementById("msg");
      const countdown = document.getElementById("countdown");
      const countdownValue = document.getElementById("countdownValue");
      const menuToggle = document.getElementById("menuToggle");
      const thoughtToggle = document.getElementById("thoughtToggle");
      const menuBackdrop = document.getElementById("menuBackdrop");
      const thoughtBackdrop = document.getElementById("thoughtBackdrop");
      const movieMenu = document.getElementById("movieMenu");
      const thoughtMenu = document.getElementById("thoughtMenu");
      const movieInput = document.getElementById("movieInput");
      const addMovieBtn = document.getElementById("addMovieBtn");
      const movieList = document.getElementById("movieList");
      const randomMovieBtn = document.getElementById("randomMovieBtn");
      const randomMovieMessage = document.getElementById("randomMovieMessage");
      const thoughtInput = document.getElementById("thoughtInput");
      const addThoughtBtn = document.getElementById("addThoughtBtn");
      const thoughtList = document.getElementById("thoughtList");
      const moodSlider = document.getElementById("moodSlider");
      const moodSelected = document.getElementById("moodSelected");
      const syncStatus = document.getElementById("syncStatus");
      let countdownTimer = null;

      // IMPORTANTE: para frontend se usa el endpoint *.supabase.co (no el dashboard URL).
      const SUPABASE_URL = "https://vkhoxnixhqnztbbosqdk.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZraG94bml4aHFuenRiYm9zcWRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzgwMDQsImV4cCI6MjA5MTgxNDAwNH0.-dUd_GEBS90Cw4rZ8UN6AuZRIsbwHJ9cvDOsLPzpd7k";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      );
      const MOVIE_TABLE_CANDIDATES = ["movies", "Movies"];
      const THOUGHT_TABLE_CANDIDATES = ["thoughts", "Thoughts"];
      let MOVIES_TABLE = "movies";
      let THOUGHTS_TABLE = "thoughts";

      let movies = [];
      let thoughts = [];
      const MOOD_STORAGE_KEY = "currentMood";
      let statusTimer = null;

      function showStatus(message, isError = false) {
        syncStatus.textContent = message;
        syncStatus.classList.add("show");
        syncStatus.style.background = isError
          ? "rgba(127, 29, 29, 0.92)"
          : "rgba(2, 6, 23, 0.82)";
        if (statusTimer) clearTimeout(statusTimer);
        if (!isError) {
          statusTimer = setTimeout(() => {
            syncStatus.classList.remove("show");
          }, 2500);
        }
      }

      async function resolveTableName(candidates) {
        for (const name of candidates) {
          const { error } = await supabaseClient.from(name).select("id").limit(1);
          if (!error) return name;
          const code = error.code || "";
          const isMissingTable = code === "PGRST205" || code === "42P01";
          if (!isMissingTable) {
            // Si no es error de tabla inexistente, devolvemos el nombre para
            // que el mensaje posterior muestre el error real (RLS/columnas/etc.).
            return name;
          }
        }
        return candidates[0];
      }

      async function initSupabaseBindings() {
        MOVIES_TABLE = await resolveTableName(MOVIE_TABLE_CANDIDATES);
        THOUGHTS_TABLE = await resolveTableName(THOUGHT_TABLE_CANDIDATES);
      }

      function openMovieMenu() {
        movieMenu.classList.add("open");
        menuBackdrop.classList.add("open");
      }

      function closeMovieMenu() {
        movieMenu.classList.remove("open");
        menuBackdrop.classList.remove("open");
      }

      function openThoughtMenu() {
        thoughtMenu.classList.add("open");
        thoughtBackdrop.classList.add("open");
      }

      function closeThoughtMenu() {
        thoughtMenu.classList.remove("open");
        thoughtBackdrop.classList.remove("open");
      }

      function toggleMovieMenu(event) {
        event.stopPropagation();
        event.preventDefault();
        if (movieMenu.classList.contains("open")) {
          closeMovieMenu();
        } else {
          openMovieMenu();
        }
      }

      function toggleThoughtMenu(event) {
        event.stopPropagation();
        event.preventDefault();
        if (thoughtMenu.classList.contains("open")) {
          closeThoughtMenu();
        } else {
          openThoughtMenu();
        }
      }

      menuToggle.addEventListener("click", toggleMovieMenu);
      thoughtToggle.addEventListener("click", toggleThoughtMenu);
      // Respaldo para algunos navegadores móviles donde el primer click falla.
      menuToggle.addEventListener("touchend", toggleMovieMenu, { passive: false });
      thoughtToggle.addEventListener("touchend", toggleThoughtMenu, { passive: false });

      menuBackdrop.addEventListener("click", (event) => {
        event.stopPropagation();
        closeMovieMenu();
      });
      thoughtBackdrop.addEventListener("click", (event) => {
        event.stopPropagation();
        closeThoughtMenu();
      });

      document.addEventListener("click", (event) => {
        const target = event.target;
        const clickedInsideMenu = movieMenu.contains(target);
        const clickedToggle = menuToggle.contains(target);
        const clickedInsideThoughts = thoughtMenu.contains(target);
        const clickedThoughtToggle = thoughtToggle.contains(target);
        if (!clickedInsideMenu && !clickedToggle) {
          closeMovieMenu();
        }
        if (!clickedInsideThoughts && !clickedThoughtToggle) {
          closeThoughtMenu();
        }
      });

      function renderMovies() {
        movieList.innerHTML = "";

        movies.forEach((movie) => {
          const item = document.createElement("li");
          item.className = `movie-item${movie.seen ? " seen" : ""}`;
          item.innerHTML = `
            <span class="movie-title"></span>
            <label class="tick-label">
              <input type="checkbox" />
              Visto
            </label>
            <div class="entry-actions">
              <button type="button" class="btn-edit">Editar</button>
              <button type="button" class="btn-delete">Borrar</button>
            </div>
          `;

          const titleEl = item.querySelector(".movie-title");
          const checkbox = item.querySelector('input[type="checkbox"]');
          const editBtn = item.querySelector(".btn-edit");
          const deleteBtn = item.querySelector(".btn-delete");
          titleEl.textContent = movie.title;
          checkbox.id = `movieSeen${movie.id}`;
          checkbox.checked = movie.seen;
          checkbox.addEventListener("change", async () => {
            const newSeen = checkbox.checked;
            item.classList.toggle("seen", newSeen);
            const { error } = await supabaseClient
              .from(MOVIES_TABLE)
              .update({ seen: newSeen })
              .eq("id", movie.id);
            if (error) {
              checkbox.checked = !newSeen;
              item.classList.toggle("seen", !newSeen);
              showStatus(`Error actualizando película: ${error.message}`, true);
              console.error("Error al actualizar película:", error.message);
            }
          });
          editBtn.addEventListener("click", async () => {
            const updatedTitle = window
              .prompt("Edita el título de la película:", movie.title)
              ?.trim();
            if (!updatedTitle || updatedTitle === movie.title) return;
            const { error } = await supabaseClient
              .from(MOVIES_TABLE)
              .update({ title: updatedTitle })
              .eq("id", movie.id);
            if (error) {
              showStatus(`Error editando película: ${error.message}`, true);
              return;
            }
            await loadMovies();
            showStatus("Película editada.");
          });
          deleteBtn.addEventListener("click", async () => {
            const ok = window.confirm(`¿Borrar "${movie.title}"?`);
            if (!ok) return;
            const { error } = await supabaseClient
              .from(MOVIES_TABLE)
              .delete()
              .eq("id", movie.id);
            if (error) {
              showStatus(`Error borrando película: ${error.message}`, true);
              return;
            }
            await loadMovies();
            showStatus("Película borrada.");
          });

          movieList.appendChild(item);
        });
      }

      async function addMovie(title) {
        const cleanTitle = title.trim();
        if (!cleanTitle) return;

        const { error } = await supabaseClient.from(MOVIES_TABLE).insert({
          title: cleanTitle,
          seen: false,
        });
        if (error) {
          showStatus(`Error guardando película: ${error.message}`, true);
          console.error("Error al guardar película:", error.message);
          return;
        }
        showStatus("Película guardada.");
      }

      function renderThoughts() {
        thoughtList.innerHTML = "";

        thoughts.forEach((thought) => {
          const item = document.createElement("li");
          item.className = "thought-item";
          const top = document.createElement("div");
          top.className = "thought-item-top";
          const text = document.createElement("div");
          text.textContent = thought.text;
          const actions = document.createElement("div");
          actions.className = "entry-actions";
          actions.innerHTML = `
            <button type="button" class="btn-edit">Editar</button>
            <button type="button" class="btn-delete">Borrar</button>
          `;
          const meta = document.createElement("div");
          meta.className = "thought-item-meta";
          meta.textContent = `#${thought.id} - ${thought.createdAt}`;
          top.appendChild(text);
          top.appendChild(actions);
          item.appendChild(top);
          item.appendChild(meta);
          thoughtList.appendChild(item);

          const editBtn = actions.querySelector(".btn-edit");
          const deleteBtn = actions.querySelector(".btn-delete");
          editBtn.addEventListener("click", async () => {
            const updatedText = window
              .prompt("Edita el pensamiento:", thought.text)
              ?.trim();
            if (!updatedText || updatedText === thought.text) return;
            const { error } = await supabaseClient
              .from(THOUGHTS_TABLE)
              .update({ text: updatedText })
              .eq("id", thought.id);
            if (error) {
              showStatus(`Error editando pensamiento: ${error.message}`, true);
              return;
            }
            await loadThoughts();
            showStatus("Pensamiento editado.");
          });
          deleteBtn.addEventListener("click", async () => {
            const ok = window.confirm("¿Borrar este pensamiento?");
            if (!ok) return;
            const { error } = await supabaseClient
              .from(THOUGHTS_TABLE)
              .delete()
              .eq("id", thought.id);
            if (error) {
              showStatus(`Error borrando pensamiento: ${error.message}`, true);
              return;
            }
            await loadThoughts();
            showStatus("Pensamiento borrado.");
          });
        });
      }

      function chooseRandomMovie() {
        if (!movies.length) {
          randomMovieMessage.textContent = "No hay películas todavía.";
          return;
        }
        const pick = movies[Math.floor(Math.random() * movies.length)];
        randomMovieMessage.textContent = `La película elegida es ${pick.title}!`;
      }

      function moodLabelFromValue(rawValue) {
        const value = Number(rawValue);
        if (value <= 20) return "Muy triste 😢";
        if (value <= 40) return "Triste 😔";
        if (value <= 60) return "Neutral 😐";
        if (value <= 80) return "Contento/a 🙂";
        return "Muy feliz 😄";
      }

      function applyMood(rawValue) {
        const normalized = Number.isFinite(Number(rawValue))
          ? Number(rawValue)
          : 50;
        moodSlider.value = String(normalized);
        moodSelected.textContent = `Ánimo actual: ${moodLabelFromValue(
          normalized
        )} (${normalized}/100)`;
      }

      async function addThought(text) {
        const cleanText = text.trim();
        if (!cleanText) return;

        const { error } = await supabaseClient.from(THOUGHTS_TABLE).insert({
          text: cleanText,
        });
        if (error) {
          showStatus(`Error guardando pensamiento: ${error.message}`, true);
          console.error("Error al guardar pensamiento:", error.message);
          return;
        }
        showStatus("Pensamiento guardado.");
      }

      async function loadMovies() {
        const { data, error } = await supabaseClient
          .from(MOVIES_TABLE)
          .select("id, title, seen, created_at")
          .order("created_at", { ascending: false, nullsFirst: false })
          .order("id", { ascending: false });
        if (error) {
          showStatus(`Error cargando películas: ${error.message}`, true);
          console.error("Error al cargar películas:", error.message);
          return;
        }
        movies = (data || [])
          .filter((movie) => movie && typeof movie.title === "string")
          .map((movie) => ({
            id: Number(movie.id),
            title: movie.title.trim(),
            seen: Boolean(movie.seen),
          }))
          .filter((movie) => movie.title.length > 0);
        renderMovies();
      }

      async function loadThoughts() {
        const { data, error } = await supabaseClient
          .from(THOUGHTS_TABLE)
          .select("id, text, created_at")
          .order("created_at", { ascending: false, nullsFirst: false })
          .order("id", { ascending: false });
        if (error) {
          showStatus(`Error cargando pensamientos: ${error.message}`, true);
          console.error("Error al cargar pensamientos:", error.message);
          return;
        }
        thoughts = (data || [])
          .filter((thought) => thought && typeof thought.text === "string")
          .map((thought) => ({
            id: Number(thought.id),
            text: thought.text.trim(),
            createdAt: thought.created_at
              ? new Date(thought.created_at).toLocaleString("es-ES")
              : "Sin fecha",
          }))
          .filter((thought) => thought.text.length > 0);
        renderThoughts();
      }

      addMovieBtn.addEventListener("click", async () => {
        await addMovie(movieInput.value);
        movieInput.value = "";
        movieInput.focus();
        await loadMovies();
      });
      randomMovieBtn.addEventListener("click", chooseRandomMovie);

      movieInput.addEventListener("keydown", async (event) => {
        if (event.key === "Enter") {
          await addMovie(movieInput.value);
          movieInput.value = "";
          movieInput.focus();
          await loadMovies();
        }
      });
      addThoughtBtn.addEventListener("click", async () => {
        await addThought(thoughtInput.value);
        thoughtInput.value = "";
        thoughtInput.focus();
        await loadThoughts();
      });

      thoughtInput.addEventListener("keydown", async (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          await addThought(thoughtInput.value);
          thoughtInput.value = "";
          thoughtInput.focus();
          await loadThoughts();
        }
      });
      moodSlider.addEventListener("input", () => {
        const moodValue = Number(moodSlider.value);
        localStorage.setItem(MOOD_STORAGE_KEY, String(moodValue));
        applyMood(moodValue);
      });

      function subscribeRealtime() {
        supabaseClient
          .channel("movies-changes")
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table: MOVIES_TABLE },
            () => {
              loadMovies();
            }
          )
          .subscribe();

        supabaseClient
          .channel("thoughts-changes")
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table: THOUGHTS_TABLE },
            () => {
              loadThoughts();
            }
          )
          .subscribe();
      }

      // Fuerza estado inicial consistente en primera carga.
      closeMovieMenu();
      closeThoughtMenu();
      (async () => {
        await initSupabaseBindings();
        await loadMovies();
        await loadThoughts();
        subscribeRealtime();
        const storedMood = localStorage.getItem(MOOD_STORAGE_KEY);
        applyMood(storedMood ?? "50");
        showStatus(
          `Conectado a Supabase (${MOVIES_TABLE} / ${THOUGHTS_TABLE}).`
        );
      })();

      function formatRemaining(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return `${days}d ${String(hours).padStart(2, "0")}h ${String(
          minutes
        ).padStart(2, "0")}m ${String(seconds).padStart(2, "0")}s`;
      }

      btn.addEventListener("click", () => {
        msg.style.display = "block";
        img.style.display = "block";
        countdown.style.display = "block";
        btn.style.display = "none";

        // Fecha objetivo: jueves 21 de mayo de 2026 a las 22:00 (hora local)
        const endTime = new Date(2026, 4, 21, 22, 0, 0).getTime();
        countdownValue.textContent = formatRemaining(endTime - Date.now());

        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
          const remaining = endTime - Date.now();
          if (remaining <= 0) {
            countdownValue.textContent = "0d 00h 00m 00s";
            clearInterval(countdownTimer);
            return;
          }
          countdownValue.textContent = formatRemaining(remaining);
        }, 1000);

        countdown.scrollIntoView({ behavior: "smooth", block: "center" });
      });
    </script>
  </body>
</html>
